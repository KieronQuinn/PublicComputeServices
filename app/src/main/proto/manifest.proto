syntax = "proto3";

package com.kieronquinn.app.pcs.model;

import "protected_download.proto";

option java_multiple_files = true;
option java_package = "com.kieronquinn.app.pcs.model";
option java_outer_classname = "ManifestProto";

message Manifests {
  repeated Manifest manifest = 1;
  repeated StaticManifest phone_manifest = 2;
  repeated StaticManifest tts_manifest = 3;
  repeated StaticManifest agent_manifest = 4;
}

message Manifest {
  com.google.android.apps.miphone.astrea.pd.api.BlobConstraints constraints = 1;
  string name = 2;
  bytes encryption_key = 3;
}

message StaticManifest {
  string id = 1;
  string name = 2;
  bytes encryption_key = 3;
}